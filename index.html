<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رصيدي للآخرة - استغفار</title>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #0f172a;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 1.6rem;
            color: #0369a1;
            margin-bottom: 10px;
        }
        p {
            color: #475569;
            margin-bottom: 25px;
        }
        .counter-box {
            font-size: 3.5rem;
            font-weight: bold;
            color: #0284c7;
            margin: 20px 0;
        }
        .btn {
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(14, 165, 233, 0.2);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ رصيدك للآخرة ✨</h1>
        <p>استغفر الله العظيم وأتوب إليه</p>
        
        <div class="counterbox" id="count">0</div>
        
        <button class="btn" onclick="increment()">استغفر الله</button>
        
        <div class="footer">
            <p>اجعله صدقة جارية عنك وعن والديك بمشاركته مع الآخرين.</p>
        </div>
    </div>

    <script>
        let counter = 0;
        function increment() {
            counter++;
            document.getElementById('count').innerText = counter;
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
    </script>
</body>
</html>
